    <script>
      // Securely shim process.env to prevent ReferenceErrors during module execution
      (function() {
        const processShim = { 
          env: { 
            NODE_ENV: 'production',
            API_KEY: '' 
          } 
        };
        window.process = processShim;
        if (typeof globalThis !== 'undefined') {
          globalThis.process = processShim;
        }
      })();
    </script>
